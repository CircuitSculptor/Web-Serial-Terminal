<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fastest Serial terminal in your browser for Chrome.</title>
    <meta name="Description" content="Set your baud speed and hit connect.
    A serial terminal that runs with out any plugins in chrome.">

    <link rel="stylesheet" href="style.css">
</head>
<body>
<!--
<button class="active" onclick="location.href='settings.html'">&#9881;</button>

-->
    
<button onclick="connectSerial()">Connect</button> 

Baud:
<input type="text" id="baud" list="baudList" style="width: 10ch;" onclick="this.value = ''"
    onchange="localStorage.baud = this.value">

<datalist id="baudList">
    <option value="110">110</option>
    <option value="300">300</option>
    <option value="600">600</option>
    <option value="1200">1200</option>
    <option value="2400">2400</option>
    <option value="4800">4800</option>
    <option value="9600">9600</option>
    <option value="14400">14400</option>
    <option value="19200">19200</option>
    <option value="38400">38400</option>
    <option value="57600">57600</option>
    <option value="115200">115200</option>
    <option value="128000">128000</option>
    <option value="256000">256000</option>
</datalist>

<button onclick="serialResultsDiv.innerHTML = '';">Clear</button>

<br>

<input type="text" id="lineToSend" style="width:calc(100% - 165px)">
<button onclick="sendSerialLine()" style="width:45px">Send</button>
<!--
<button onclick="sendCharacterNumber()" style="width:100px">Send Char</button>
-->

<br>

<label>
    <input type="checkbox" id="carriageReturn" onclick="localStorage.carriageReturn = this.checked;" checked>
    send with /r
</label>

<label>
    <input type="checkbox" id="addLine" onclick="localStorage.addLine = this.checked;" checked>
    send with /n
</label>

<label>
    <input type="checkbox" id="echoOn" onclick="localStorage.echoOn = this.checked;" checked>
    echo
</label>

<br>

<div id="channels">
    
    <div class="channel">
        <div class="row">
            <div class="power-group">
                <button class="power on" onclick="toggleOutput(1, true)">ON</button>
            </div>
            <br>
            <div class="channel-title">CHANNEL 1</div>
            <br>
            <div class="power-group">
                <button class="power off" onclick="toggleOutput(1, false)">OFF</button>
            </div>
        </div>
        <div class="readouts">
            <div class="row">
                <div class="readout">
                    <div class="label">Voltage</div>
                    <div id="ch1_voltage">0.000 V</div>
                </div>
                <br>
                <!--
                <div class="set-group">
                    <input id="ch1_set_voltage" placeholder="0.000">
                    <button onclick="applyVoltage(1)">SET</button>
                </div>
                -->
                <div class="readout">
                    <div class="label">Voltage Set</div>
                    <div id="ch1_voltage_set">0.000 V</div>
                </div>
            </div>
            <div class="row">
                <div class="readout">
                    <div class="label">Current</div>
                    <div id="ch1_current">0.000 A</div>
                </div>  
                <br>
                <!--
                <div class="set-group">
                    <input id="ch1_set_current" placeholder="0.000">
                    <button onclick="applyCurrent(1)">SET</button>
                </div>
                -->
                <div class="readout">
                    <div class="label">Current Set</div>
                    <div id="ch1_current_set">0.000 A</div>
                </div> 
            </div>
        </div>
    </div>
    
    <!-- working channel 1 layout
    <div class="channel">
        <div class="channel-title">CHANNEL 1</div>
    
        <div class="readouts">
    
            <div class="row">
                <div class="readout">
                    <div class="label">Voltage</div>
                    <div id="ch1_voltage">12.340 V</div>
                </div>
                <button class="power on" onclick="toggleOutput(1, true)">ON</button>
            </div>

                    <div id="ch1_current">0.500 A</div>
                </div>
                <button class="power off" onclick="toggleOutput(1, false)">OFF</button>
            </div>
        </div>
    </div>
    -->

    <div class="channel">
        <div class="channel-title">CHANNEL 2</div>
    
        <div class="readouts">
    
            <div class="row">
                <div class="readout">
                    <div class="label">Voltage</div>
                    <div id="ch2_voltage">12.340 V</div>
                </div>
                <!-- <button class="power on" onclick="toggleOutput(1, true)">ON</button> -->
            </div>
    
            <div class="row">
                <div class="readout">
                    <div class="label">Current</div>
                    <div id="ch2_current">0.500 A</div>
                </div>
                <!-- <button class="power off" onclick="toggleOutput(1, false)">OFF</button> -->
            </div>
        </div>
    </div>
</div>

<br>

<button onclick="setVoltage(1)">Set V</button>
<button onclick="setCurrent(1)">Set I</button>
<button onclick="toggleOutput(1, true)">ON</button>
<button onclick="toggleOutput(1, false)">OFF</button>
    
<br>
